<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sistem Klasifikasi Status Gizi{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">
                <svg viewBox="0 0 24 24">
                    <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                </svg>
            </div>
            <div class="sidebar-brand">
                <h4 class="sidebar-title">Sistem Klasifikasi <br> Status Gizi Ibu Hamil </h4>
                <p class="sidebar-subtitle"></p>
            </div>
        </div>

        <nav class="sidebar-nav">
            <a href="{{ url_for('main_routes.dashboard') }}" class="nav-item {% if request.endpoint == 'main_routes.dashboard' %}active{% endif %}">
                <span class="nav-icon">
                    <svg viewBox="0 0 24 24" fill="none" width="18" height="18">
                        <rect x="3" y="3" width="7" height="7" rx="1.5" fill="currentColor" opacity="0.8"/>
                        <rect x="14" y="3" width="7" height="7" rx="1.5" fill="currentColor" opacity="0.8"/>
                        <rect x="3" y="14" width="7" height="7" rx="1.5" fill="currentColor" opacity="0.8"/>
                        <rect x="14" y="14" width="7" height="7" rx="1.5" fill="currentColor" opacity="0.8"/>
                    </svg>
                </span>
                <span>Dashboard</span>
            </a>
            <a href="{{ url_for('main_routes.input_data') }}" class="nav-item {% if request.endpoint == 'main_routes.input_data' or request.endpoint == 'main_routes.hasil' %}active{% endif %}">
                <span class="nav-icon">
                    <svg viewBox="0 0 24 24" fill="none" width="18" height="18">
                        <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </span>
                <span>Cek Status Gizi</span>
            </a>
            <a href="{{ url_for('main_routes.pesan_gizi') }}" class="nav-item {% if request.endpoint == 'main_routes.pesan_gizi' %}active{% endif %}">
                <span class="nav-icon">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                </span>
                <span>Pesan Gizi Ibu Hamil</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <div class="sidebar-user" style="justify-content: space-between; width: 100%;">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <div class="sidebar-avatar">{{ session.get('username', 'User')[0]|upper }}</div>
                    <div>
                        <p class="sidebar-user-name" style="text-transform: capitalize; font-size: 14px;">{{ session.get('username', 'Guest') }}</p>
                    </div>
                </div>
                <a href="{{ url_for('main_routes.logout') }}" title="Logout" style="color: #ef4444; padding: 6px; display: flex; align-items: center; justify-content: center; border-radius: 6px; transition: background 0.2s;" onmouseover="this.style.background='#fee2e2'" onmouseout="this.style.background='transparent'">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                </a>
            </div>
        </div>
    </aside>

    <!-- Overlay for mobile -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <!-- Main -->
    <div class="main-wrapper">
        <header class="topbar">
            <button class="menu-toggle" onclick="toggleSidebar()" aria-label="Toggle menu">
                <svg viewBox="0 0 24 24" fill="none" width="20" height="20">
                    <path d="M4 6h16M4 12h16M4 18h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>
            <h2 class="topbar-title">{% block page_title %}Dashboard{% endblock %}</h2>
        </header>

        <main class="main-content">
            {% block content %}{% endblock %}
        </main>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script>
    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        sidebar.classList.toggle('open');
        overlay.classList.toggle('active');
    }
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
