{% extends 'base.html' %}

{% block page_title %}Edit Data{% endblock %}

{% block content %}
<div class="container-main">
    <a href="{{ url_for('main_routes.detail_riwayat', id=data.id) }}" class="btn-back">← Kembali ke Detail</a>

    <div class="card">
        <h2>Edit Data Pemeriksaan</h2>
        <p class="card-desc">Perbarui data pemeriksaan ibu hamil</p>

        <div id="data-wilayah-container" data-wilayah='{{ data_wilayah | tojson }}' style="display:none;"></div>
        <form action="{{ url_for('main_routes.edit_riwayat', id=data.id) }}" method="POST">
            <div class="form-row">
                <div class="form-group">
                    <label for="nik">NIK</label>
                    <input type="text" id="nik" name="nik" value="{{ data.nik }}" placeholder="16 digit NIK" maxlength="16" pattern="[0-9]{16}" required>
                </div>
                <div class="form-group">
                    <label for="nama">Nama</label>
                    <input type="text" id="nama" name="nama" value="{{ data.nama }}" placeholder="Masukkan nama" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="kecamatan">Kecamatan</label>
                    <select id="kecamatan_display" required disabled>
                        <option value="Abeli" selected>Abeli</option>
                    </select>
                    <input type="hidden" id="kecamatan" name="kecamatan" value="Abeli">
                </div>
                <div class="form-group">
                    <label for="kelurahan">Kelurahan</label>
                    <select id="kelurahan" name="kelurahan" data-selected="{{ data.kelurahan }}" required>
                        <option value="" disabled>Pilih Kelurahan...</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="tanggal_lahir">Tanggal Lahir</label>
                    <input type="date" id="tanggal_lahir" name="tanggal_lahir" value="{{ data.tanggal_lahir }}" required>
                </div>
                <div class="form-group">
                    <label for="umur">Umur (tahun)</label>
                    <input type="number" id="umur" name="umur" value="{{ data.umur }}" readonly required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="bb_awal">Berat Badan Awal (Kg)</label>
                    <input type="number" id="bb_awal" name="bb_awal" value="{{ data.bb_awal }}" step="0.1" required>
                </div>
                <div class="form-group">
                    <label for="bb_sekarang">Berat Badan Sekarang (Kg)</label>
                    <input type="number" id="bb_sekarang" name="bb_sekarang" value="{{ data.bb_sekarang }}" step="0.1" required>
                </div>
            </div>

            <div class="form-group">
                <label for="tinggi_badan">Tinggi Badan (Cm)</label>
                <input type="number" id="tinggi_badan" name="tinggi_badan" value="{{ data.tinggi_badan }}" step="0.1" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="lila">LiLA (Cm)</label>
                    <input type="number" id="lila" name="lila" value="{{ data.lila }}" step="0.1" required>
                </div>
                <div class="form-group">
                    <label for="trimester">Trimester</label>
                    <select id="trimester" name="trimester" required>
                        <option value="1" {% if data.trimester == 1 %}selected{% endif %}>Trimester 1 (0-12 minggu)</option>
                        <option value="2" {% if data.trimester == 2 %}selected{% endif %}>Trimester 2 (13-27 minggu)</option>
                        <option value="3" {% if data.trimester == 3 %}selected{% endif %}>Trimester 3 (28-40 minggu)</option>
                    </select>
                </div>
            </div>
            
            <div class="imt-preview" id="imtPreview" style="display:none;">
                <span>IMT Pra-Kehamilan: </span>
                <strong id="imtValue">-</strong>
                <span> kg/m²</span>
            </div>

            <div class="form-actions">
                <a href="{{ url_for('main_routes.detail_riwayat', id=data.id) }}" class="btn btn-outline">Batal</a>
                <button type="submit" class="btn">Simpan Perubahan</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
var bbAwal = document.getElementById('bb_awal');
var tinggi = document.getElementById('tinggi_badan');
var umur = document.getElementById('umur');
var tanggal_lahir = document.getElementById('tanggal_lahir');
var imtVal = document.getElementById('imtValue');
var imtPreview = document.getElementById('imtPreview');

function calculateAge() {
    if (!tanggal_lahir.value) return;
    const today = new Date();
    const birthday = new Date(tanggal_lahir.value);
    let currentAge = today.getFullYear() - birthday.getFullYear();
    let selisihBulan = today.getMonth() - birthday.getMonth();
    if (selisihBulan < 0 || (selisihBulan === 0 && today.getDate() - birthday.getDate() < 0)) {
        currentAge--;
    }
    umur.value = currentAge;
}
tanggal_lahir.addEventListener('input', calculateAge);

function hitungIMT() {
    var bb = parseFloat(bbAwal.value);
    var tb = parseFloat(tinggi.value);
    if (bb > 0 && tb > 0) {
        var imt = bb / Math.pow(tb / 100, 2);
        imtVal.textContent = imt.toFixed(2);
        imtPreview.style.display = 'block';
    }
}
bbAwal.addEventListener('input', hitungIMT);
tinggi.addEventListener('input', hitungIMT);

// Wilayah Data
const containerWilayah = document.getElementById('data-wilayah-container');
let dataWilayah = {};
if (containerWilayah && containerWilayah.dataset.wilayah) {
    dataWilayah = JSON.parse(containerWilayah.dataset.wilayah);
}

const inputKecamatan = document.getElementById('kecamatan');
const selectKelurahan = document.getElementById('kelurahan');
const selectedKelurahan = selectKelurahan.getAttribute('data-selected');

function updateKelurahan(namaKecamatan) {
    const daftarKelurahan = dataWilayah[namaKecamatan] || [];
    selectKelurahan.innerHTML = '<option value="" disabled>Pilih Kelurahan...</option>';

    if (daftarKelurahan.length > 0) {
        selectKelurahan.disabled = false;
        daftarKelurahan.forEach(function (kel) {
            const option = document.createElement('option');
            option.value = kel;
            option.textContent = kel;
            if (kel === selectedKelurahan) {
                option.selected = true;
            }
            selectKelurahan.appendChild(option);
        });
    } else {
        selectKelurahan.disabled = true;
    }
}

document.addEventListener('DOMContentLoaded', function () {
    if (inputKecamatan && inputKecamatan.value) {
        updateKelurahan(inputKecamatan.value);
    }
    // Calculate initial IMT if data exists
    if (bbAwal.value && tinggi.value) {
        hitungIMT();
    }
});
</script>
{% endblock %}
